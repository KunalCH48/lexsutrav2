<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#080c14"/>

  <!-- Subtle radial glow behind shield -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2d9cdb" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#080c14" stop-opacity="0"/>
  </radialGradient>
  <circle cx="200" cy="185" r="180" fill="url(#glow)"/>

  <!-- Shield scaled up and centered (original 64x64 → 240x240, centered at 200,185) -->
  <g transform="translate(80, 55) scale(3.75)">
    <!-- Shield outline -->
    <path
      d="M32 6 L56 15 L56 35 Q56 52 32 61 Q8 52 8 35 L8 15 Z"
      stroke="#c8a84b"
      stroke-width="1.8"
      fill="rgba(200,168,75,0.08)"
      stroke-linejoin="round"
    />
    <!-- Central neural node (gold) -->
    <circle cx="32" cy="28" r="4" fill="#c8a84b"/>
    <!-- Outer nodes (blue) -->
    <circle cx="19" cy="21" r="2.5" fill="#2d9cdb"/>
    <circle cx="45" cy="21" r="2.5" fill="#2d9cdb"/>
    <circle cx="19" cy="37" r="2.5" fill="#2d9cdb"/>
    <circle cx="45" cy="37" r="2.5" fill="#2d9cdb"/>
    <circle cx="32" cy="46" r="2" fill="#2d9cdb" opacity="0.65"/>
    <!-- Connections to centre -->
    <line x1="19" y1="21" x2="32" y2="28" stroke="#2d9cdb" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="21" x2="32" y2="28" stroke="#2d9cdb" stroke-width="1" opacity="0.6"/>
    <line x1="19" y1="37" x2="32" y2="28" stroke="#2d9cdb" stroke-width="1" opacity="0.6"/>
    <line x1="45" y1="37" x2="32" y2="28" stroke="#2d9cdb" stroke-width="1" opacity="0.6"/>
    <line x1="32" y1="46" x2="32" y2="32" stroke="#2d9cdb" stroke-width="1" opacity="0.4"/>
    <!-- Cross-connections -->
    <line x1="19" y1="21" x2="45" y2="21" stroke="#2d9cdb" stroke-width="0.6" opacity="0.28"/>
    <line x1="19" y1="37" x2="45" y2="37" stroke="#2d9cdb" stroke-width="0.6" opacity="0.28"/>
    <line x1="19" y1="21" x2="19" y2="37" stroke="#2d9cdb" stroke-width="0.6" opacity="0.28"/>
    <line x1="45" y1="21" x2="45" y2="37" stroke="#2d9cdb" stroke-width="0.6" opacity="0.28"/>
  </g>

  <!-- Wordmark below shield -->
  <text
    x="200"
    y="342"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    letter-spacing="1"
    fill="#c8a84b"
    text-anchor="middle"
  >LexSutra</text>

  <!-- Thin gold border -->
  <rect x="2" y="2" width="396" height="396" rx="8" stroke="#c8a84b" stroke-width="1.5" stroke-opacity="0.25" fill="none"/>
</svg>
